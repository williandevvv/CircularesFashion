<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circulares | Admin</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <script type="module" src="./js/guard-admin.js"></script>
</head>
<body>
  <div class="layout">
    <header class="mobile-header">
      <button class="btn btn-secondary mobile-menu-toggle" type="button" aria-label="Abrir menú">☰</button>
      <h1>Admin</h1>
    </header>

    <aside class="sidebar">
      <h1>Admin</h1>
      <a class="btn btn-secondary" href="./index.html">Volver al buscador</a>
      <button id="btnLogout" class="btn btn-ghost">Cerrar sesión</button>
      <small id="userBadge" class="muted"></small>
    </aside>

    <main class="main">
      <section class="panel">
        <h2 id="formTitle">Nueva circular</h2>
        <form id="circular-form" class="grid-form">
          <label>Número</label>
          <input name="numero" required placeholder="005-26" />

          <label>Departamento</label>
          <input name="departamento" required placeholder="HOGAR" />

          <label>Fecha</label>
          <input name="fecha" type="date" required />

          <label>Aplica a</label>
          <select name="aplicaA" required>
            <option value="">Selecciona...</option>
            <option value="todas">todas</option>
            <option value="mall">mall</option>
            <option value="centro">centro</option>
            <option value="tiendas_especificas">tiendas_especificas</option>
          </select>

          <label>PDF de la circular</label>
          <input id="pdfFile" type="file" accept="application/pdf" required />
          <small id="pdfStatus" class="muted">Debes subir un PDF para guardar la circular.</small>

          <label>Códigos detectados</label>
          <input id="codigos" name="codigos" placeholder="Se completa desde PDF o manualmente (separados por coma)" />

          <div class="actions">
            <button id="submitButton" class="btn" type="submit">Crear circular</button>
            <button id="cancelEditButton" class="btn btn-secondary hidden" type="button">Cancelar edición</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>Circulares guardadas</h2>
        <p id="adminMessage" class="muted"></p>
        <div id="circularesList"></div>
      </section>
    </main>
  </div>

  <script type="module" src="./js/admin.js"></script>
</body>
</html>
