<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circulares | Admin</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <script type="module" src="./js/guard-admin.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>Admin</h1>
      <a class="btn btn-secondary" href="./index.html">Volver al buscador</a>
      <button id="btnLogout" class="btn btn-ghost">Cerrar sesión</button>
      <small id="userBadge" class="muted"></small>
    </aside>

    <main class="main">
      <section class="panel">
        <h2>Nueva circular</h2>
        <form id="circular-form" class="grid-form">
          <label>Número</label>
          <input name="numero" required placeholder="005-26" />

          <label>Departamento</label>
          <input name="departamento" required placeholder="HOGAR" />

          <label>Fecha</label>
          <input name="fecha" type="date" required />

          <label>Aplica a</label>
          <select name="aplicaA" required>
            <option value="">Selecciona...</option>
            <option value="todas">todas</option>
            <option value="mall">mall</option>
            <option value="centro">centro</option>
            <option value="tiendas_especificas">tiendas_especificas</option>
          </select>

          <label>Imágenes de la circular (pueden ser varias)</label>
          <input id="previewImages" type="file" accept="image/*" multiple />
          <div id="previewThumbs" class="preview-thumbs"></div>

          <label>PDF de la circular (opcional, para leer códigos)</label>
          <input id="pdfFile" type="file" accept="application/pdf" />
          <small id="pdfStatus" class="muted">Si subes un PDF, se intentarán extraer códigos automáticamente para el buscador.</small>

          <label>Códigos detectados</label>
          <input id="codigos" name="codigos" placeholder="Se completa desde PDF o manualmente (separados por coma)" />

          <button class="btn" type="submit">Guardar circular</button>
        </form>
      </section>

      <section class="card">
        <h2>Circulares guardadas</h2>
        <p id="adminMessage" class="muted"></p>
        <div id="circularesList"></div>
      </section>
    </main>
  </div>

  <script type="module" src="./js/admin.js"></script>
</body>
</html>
