<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circulares | Detalle</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="layout">
    <header class="mobile-header">
      <button class="btn btn-secondary mobile-menu-toggle" type="button" aria-label="Abrir menú">☰</button>
      <h1>Detalle</h1>
      <button id="mobileLogout" class="btn btn-ghost">Salir</button>
    </header>

    <aside class="sidebar">
      <h1>Detalle</h1>
      <a class="btn btn-secondary" href="./index.html">Volver</a>
      <button id="btnLogout" class="btn btn-ghost">Cerrar sesión</button>
      <small id="userBadge" class="muted"></small>
    </aside>

    <main class="main">
      <section class="panel">
        <h2>Información de circular</h2>
        <div id="meta"></div>
      </section>

      <section class="card">
        <h2>Vista de la circular</h2>
        <iframe id="pdfFrame" style="width:100%;height:80vh;border:1px solid #e5e7eb;border-radius:12px;"></iframe>
        <p id="noPdf" class="muted" style="display:none;">Esta circular no tiene PDF asociado.</p>
        <p><a id="openPdf" class="btn btn-secondary" target="_blank" rel="noopener">Abrir PDF</a></p>
      </section>
    </main>
  </div>

  <script type="module" src="./js/detalle.js"></script>
</body>
</html>
