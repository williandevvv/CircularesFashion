<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circulares | Detalle</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>Detalle</h1>
      <a class="btn btn-secondary" href="./index.html">Volver</a>
      <button id="btnLogout" class="btn btn-ghost">Cerrar sesión</button>
      <small id="userBadge" class="muted"></small>
    </aside>

    <main class="main">
      <section class="panel">
        <h2>Información de circular</h2>
        <div id="meta"></div>
      </section>

      <section class="card">
        <h2>Vista del PDF</h2>
        <div id="pdfActions" class="actions">
          <button id="zoomOut" class="btn btn-secondary" type="button">-</button>
          <button id="zoomIn" class="btn" type="button">+</button>
          <a id="openPdf" class="btn" target="_blank" rel="noopener">Abrir PDF</a>
        </div>
        <div id="pdfViewer" class="pdf-viewer"></div>
        <p id="pdfFallback" style="display:none;">Esta circular no tiene PDF asociado.</p>
      </section>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.js';
  </script>
  <script type="module" src="./js/detalle.js"></script>
</body>
</html>
