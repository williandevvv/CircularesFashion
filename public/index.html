<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Circulares | Dashboard</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <div class="brand">
          <h1>Circulares</h1>
          <p>Gestión interna</p>
        </div>
        <nav class="nav-links">
          <a href="./index.html" class="active">Dashboard</a>
          <a href="./admin.html" id="adminNavLink" class="hidden">Panel Admin</a>
          <button id="logoutBtn" class="ghost-btn">Cerrar sesión</button>
        </nav>
      </aside>

      <main class="content">
        <header class="topbar card">
          <div>
            <h2>Buscador de circulares</h2>
            <p id="welcomeText">Cargando usuario...</p>
          </div>
          <div class="filters">
            <input id="searchInput" type="text" placeholder="Ej: 005-26 o COJIN130" />
            <select id="departmentFilter">
              <option value="">Todos los departamentos</option>
            </select>
            <button id="searchBtn" class="primary-btn">Buscar</button>
          </div>
        </header>

        <section class="results" id="resultsContainer"></section>
      </main>
    </div>

    <script type="module" src="./js/search.js"></script>
  </body>
</html>
