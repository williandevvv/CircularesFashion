<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circulares Fashion — Inicio</title>
  <script>
    if (location.pathname.endsWith("/public")) {
      location.replace(`${location.pathname}/${location.search}${location.hash}`);
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>" />
</head>
<body>

<!-- ══════════════════════════════════════════════════════
     PANTALLA DE LOGIN
══════════════════════════════════════════════════════ -->
<div id="login-screen" class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">CF</div>
      <h1>Circulares <span>Fashion</span></h1>
      <p>Sistema de Gestión de Circulares Internas</p>
    </div>

    <div id="alert-login" class="alert alert-error hidden"></div>

    <div class="form-group">
      <label class="form-label" for="login-email">Correo electrónico</label>
      <input type="email" id="login-email" class="form-control"
        placeholder="usuario@empresa.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label class="form-label" for="login-password">Contraseña</label>
      <input type="password" id="login-password" class="form-control"
        placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button id="btn-login" class="btn btn-primary btn-full btn-lg" style="margin-top:4px">
      <span id="btn-login-text">Iniciar Sesión</span>
    </button>

    <p id="boot-status" class="text-muted mt-16"
      style="font-size:0.75rem;text-align:center;min-height:18px"></p>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     DASHBOARD
══════════════════════════════════════════════════════ -->
<div id="dashboard-screen" class="page-wrapper hidden">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="navbar-brand">
        <div class="logo-icon">CF</div>
        Circulares <span>Fashion</span>
      </div>
      <div class="navbar-actions">
        <div class="user-pill">
          <div class="user-avatar" id="nav-avatar">?</div>
          <div>
            <div class="user-name" id="nav-name">—</div>
            <div class="user-role" id="nav-role">—</div>
          </div>
        </div>
        <a id="btn-go-admin" href="./admin.html" class="btn btn-outline btn-sm hidden">⚙ Admin</a>
        <button id="btn-logout" class="btn btn-ghost btn-sm">Salir</button>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="dashboard">

    <!-- Stats -->
    <div class="stats-strip" id="stats-strip">
      <div class="stat-card">
        <div class="stat-icon">📋</div>
        <div>
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-label">Total Circulares</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🏢</div>
        <div>
          <div class="stat-value" id="stat-depts">—</div>
          <div class="stat-label">Departamentos</div>
        </div>
      </div>
    </div>

    <!-- Search & filter -->
    <div class="search-section">
      <p class="search-section-label">🔍 Buscar circulares</p>
      <div class="search-row">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="search" id="search-input" class="form-control"
            placeholder="Número, departamento, aplica a…" />
        </div>
        <select id="filter-dept" class="form-control filter-select">
          <option value="all">Todos los departamentos</option>
        </select>
      </div>
    </div>

    <!-- Results header -->
    <div class="section-header">
      <span class="section-title">Circulares</span>
      <span class="section-count" id="result-count">— resultados</span>
    </div>

    <!-- Grid -->
    <div id="circulares-grid" class="circulares-grid">
      <div class="loading-state">
        <div class="spinner"></div><span>Cargando circulares…</span>
      </div>
    </div>

  </main>
</div>

<!-- Toast -->
<div class="toast-container" id="toast-container"></div>

<script type="module">
import { onAuth, login, logout, getUserProfile, ensureUserDoc } from "./js/auth.js";
import { getCirculares } from "./js/db.js";
import { filterCirculares, extractDepartments } from "./js/search.js";
import { showToast, formatDate, getInitials } from "./js/app-config.js";

const loginScreen     = document.getElementById("login-screen");
const dashboardScreen = document.getElementById("dashboard-screen");
let allCirculares = [];
let userProfile   = null;
let filtersReady  = false;

// ── Bootstrap admin silencioso ────────────────────────────────
bootstrapAdmin().catch(() => {});

// ── Auth state ────────────────────────────────────────────────
onAuth(async user => {
  if (!user) {
    loginScreen.classList.remove("hidden");
    dashboardScreen.classList.add("hidden");
    return;
  }
  loginScreen.classList.add("hidden");
  await ensureUserDoc(user);
  userProfile = await getUserProfile(user.uid);
  if (!userProfile?.isActive) { await logout(); return; }
  renderNavUser();
  dashboardScreen.classList.remove("hidden");
  await loadCirculares();
});

// ── Login ─────────────────────────────────────────────────────
async function doLogin() {
  const email    = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  const alertEl  = document.getElementById("alert-login");
  const btn      = document.getElementById("btn-login");
  const btnText  = document.getElementById("btn-login-text");

  alertEl.classList.add("hidden");
  if (!email || !password) {
    alertEl.textContent = "Ingresa tu correo y contraseña.";
    alertEl.classList.remove("hidden"); return;
  }
  btn.disabled = true; btnText.textContent = "Ingresando…";
  try {
    await login(email, password);
  } catch (e) {
    const msgs = {
      "auth/invalid-credential":     "Credenciales incorrectas.",
      "auth/wrong-password":         "Contraseña incorrecta.",
      "auth/user-not-found":         "Usuario no encontrado.",
      "auth/invalid-email":          "Correo inválido.",
      "auth/too-many-requests":      "Demasiados intentos. Intenta más tarde.",
      "auth/user-disabled":          "Esta cuenta está deshabilitada."
    };
    alertEl.textContent = msgs[e.code] || e.message;
    alertEl.classList.remove("hidden");
  } finally {
    btn.disabled = false; btnText.textContent = "Iniciar Sesión";
  }
}

document.getElementById("btn-login").addEventListener("click", doLogin);
["login-email","login-password"].forEach(id =>
  document.getElementById(id)?.addEventListener("keydown", e => { if (e.key==="Enter") doLogin(); })
);

// ── Logout ────────────────────────────────────────────────────
document.getElementById("btn-logout").addEventListener("click", async () => { await logout(); });

// ── Render nav user ───────────────────────────────────────────
function renderNavUser() {
  if (!userProfile) return;
  document.getElementById("nav-name").textContent  = userProfile.displayname || userProfile.email;
  document.getElementById("nav-role").textContent  = userProfile.role;
  document.getElementById("nav-avatar").textContent = getInitials(userProfile.displayname || userProfile.email);
  if (userProfile.role === "admin")
    document.getElementById("btn-go-admin")?.classList.remove("hidden");
}

// ── Load circulares ───────────────────────────────────────────
async function loadCirculares() {
  const grid = document.getElementById("circulares-grid");
  try {
    allCirculares = await getCirculares();
    buildFilters();
    renderGrid(allCirculares);
    updateStats();
  } catch (e) {
    grid.innerHTML = `<div class="alert alert-error" style="grid-column:1/-1">${e.message}</div>`;
  }
}

function buildFilters() {
  if (filtersReady) return;
  filtersReady = true;
  const sel   = document.getElementById("filter-dept");
  const depts = extractDepartments(allCirculares);
  sel.innerHTML = `<option value="all">Todos los departamentos</option>` +
    depts.map(d => `<option value="${d}">${d}</option>`).join("");
  sel.addEventListener("change", applyFilters);
  document.getElementById("search-input").addEventListener("input", applyFilters);
}

function applyFilters() {
  const q    = document.getElementById("search-input").value;
  const dept = document.getElementById("filter-dept").value;
  renderGrid(filterCirculares(allCirculares, q, dept === "all" ? "" : dept));
}

function renderGrid(list) {
  const grid  = document.getElementById("circulares-grid");
  const count = document.getElementById("result-count");
  count.textContent = `${list.length} resultado${list.length !== 1 ? "s" : ""}`;

  if (!list.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <h3>Sin resultados</h3>
        <p>No hay circulares que coincidan con tu búsqueda.</p>
      </div>`;
    return;
  }

  grid.innerHTML = list.map(c => `
    <div class="circular-card" onclick="location.href='./detalle.html?id=${c.id}'">
      <div class="card-header-row">
        <span class="circular-numero">${c.numero||"—"}</span>
        <span class="circular-badge">${(c.departamento||"General").substring(0,18)}</span>
      </div>
      <div class="circular-dept">${c.aplicaA||"Sin asignación especificada"}</div>
      <div class="circular-meta">
        <div class="circular-meta-item">
          <span class="meta-icon">🏢</span>${c.departamento||"—"}
        </div>
        <div class="circular-meta-item">
          <span class="meta-icon">📅</span>${formatDate(c.fecha)}
        </div>
      </div>
      <div class="card-actions">
        <a href="./detalle.html?id=${c.id}" class="btn btn-primary btn-sm"
          onclick="event.stopPropagation()">📄 Ver Circular</a>
      </div>
    </div>`).join("");
}

function updateStats() {
  document.getElementById("stat-total").textContent = allCirculares.length;
  document.getElementById("stat-depts").textContent =
    new Set(allCirculares.map(c => c.departamento).filter(Boolean)).size;
}
</script>
</body>
</html>
