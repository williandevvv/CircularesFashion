<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circulares | Inicio</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="layout">
    <header class="mobile-header">
      <button class="btn btn-secondary mobile-menu-toggle" type="button" aria-label="Abrir menú">☰</button>
      <h1>Circulares</h1>
      <button id="mobileLogout" class="btn btn-ghost">Borrar clave admin</button>
    </header>

    <aside class="sidebar">
      <h1>Circulares</h1>
      <p class="muted">Panel interno</p>
      <button id="btnAdmin" class="btn">Ir a Admin</button>
      <button id="btnLogout" class="btn btn-ghost">Borrar clave admin</button>
      <small id="userBadge" class="muted"></small>
    </aside>

    <main class="main">
      <section id="appView">
        <div class="panel search-panel">
          <h2>Buscador de circulares</h2>
          <div class="actions" style="margin-bottom:12px;">
            <button id="btnPriorityUpload" class="btn" type="button">Subir circular (requiere clave)</button>
          </div>
          <div class="filters">
            <input id="searchInput" type="text" placeholder="Buscar por código (COJIN130), número (005-26) o departamento" />
            <select id="departmentFilter"></select>
          </div>
        </div>

        <p id="uploadStatus" class="hidden" role="status" aria-live="polite"></p>
        <section id="cardsContainer" class="cards"></section>

        <section id="selectedCircularSection" class="card hidden">
          <h2>Circular recién subida</h2>
          <div id="selectedCircularMeta"></div>
          <iframe id="selectedCircularFrame" style="width:100%;height:80vh;border:1px solid #e5e7eb;border-radius:12px;"></iframe>
          <p id="selectedCircularNoPdf" class="muted hidden">Esta circular no tiene PDF asociado.</p>
          <p><a id="selectedCircularOpenPdf" class="btn btn-secondary" target="_blank" rel="noopener">Abrir PDF</a></p>
        </section>
      </section>
    </main>
  </div>

  <script type="module" src="./js/search.js"></script>
</body>
</html>
